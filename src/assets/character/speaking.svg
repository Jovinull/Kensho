<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Sound waves -->
  <path d="M 24 38 A 24 24 0 0 0 24 62" fill="none" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" />
  </path>
  <path d="M 76 38 A 24 24 0 0 1 76 62" fill="none" stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" />
  </path>
  <path d="M 16 32 A 34 34 0 0 0 16 68" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="1.2s" begin="0.3s" repeatCount="indefinite" />
  </path>
  <path d="M 84 32 A 34 34 0 0 1 84 68" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.1;0.6;0.1" dur="1.2s" begin="0.3s" repeatCount="indefinite" />
  </path>
  <!-- Main Body -->
  <circle cx="50" cy="50" r="32" fill="#ffffff" stroke="#0ea5e9" stroke-width="3" filter="url(#shadow)" />
  <!-- Cheeks -->
  <circle cx="34" cy="52" r="3.5" fill="#38bdf8" opacity="0.5" />
  <circle cx="66" cy="52" r="3.5" fill="#38bdf8" opacity="0.5" />
  <!-- Happy Eyes (Arcs) -->
  <path d="M 37 45 Q 40 41 43 45" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" />
  <path d="M 57 45 Q 60 41 63 45" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" />
  <!-- Speaking Mouth (Open) -->
  <path d="M 45 54 Q 50 62 55 54 Z" fill="#0ea5e9" />
</svg>
