<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25" />
    </filter>
    <filter id="glow-alert" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Alert pulsing ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fcd34d" stroke-width="2" opacity="0.8">
    <animate attributeName="r" values="36;44;36" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Main Body -->
  <circle cx="50" cy="50" r="32" fill="#ffffff" stroke="#f59e0b" stroke-width="3" filter="url(#shadow)" />
  
  <!-- Exclamation floating badge -->
  <g transform="translate(68, 22)">
    <circle cx="0" cy="0" r="10" fill="#ef4444" filter="url(#glow-alert)" />
    <path d="M 0 -4 L 0 1 M 0 4 L 0 5" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Eyes - slightly surprised/focused -->
  <circle cx="40" cy="45" r="4.5" fill="#b45309" />
  <circle cx="60" cy="45" r="4.5" fill="#b45309" />
  
  <!-- Mouth (small 'o') -->
  <circle cx="50" cy="56" r="2.5" fill="#b45309" />
</svg>
