<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25" />
    </filter>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <!-- Animated thinking ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#glow)" stroke-width="3" stroke-dasharray="60 30" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="2s" repeatCount="indefinite" />
  </circle>
  <!-- Main Body -->
  <circle cx="50" cy="50" r="32" fill="#ffffff" stroke="url(#glow)" stroke-width="3" filter="url(#shadow)" />
  <!-- Thinking Eyes (Infinity or Loading dots) -->
  <!-- Left Eye -->
  <path d="M 36 46 A 4 4 0 0 1 44 46 A 4 4 0 0 1 36 46" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" />
  <!-- Right Eye -->
  <path d="M 56 46 A 4 4 0 0 1 64 46 A 4 4 0 0 1 56 46" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" />
  <!-- Hmm mouth (wavy or straight) -->
  <path d="M 45 56 Q 47 54 50 56 T 55 56" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round" />
</svg>
